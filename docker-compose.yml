services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mini_project_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - mini_project_net
    depends_on:
      - db

  webserver:
    image: nginx:stable-alpine
    container_name: mini_project_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
    networks:
      - mini_project_net
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: mini_project_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: mini_project
      MYSQL_USER: mini_user
      MYSQL_PASSWORD: mini_pass
      MYSQL_ROOT_PASSWORD: root_pass
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - mini_project_net

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: mini_project_phpmyadmin
    restart: unless-stopped
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root_pass
    ports:
      - "8081:80"
    networks:
      - mini_project_net
    depends_on:
      - db

networks:
  mini_project_net:
    driver: bridge

volumes:
  db_data:
    driver: local
